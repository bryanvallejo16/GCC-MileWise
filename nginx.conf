# nginx config for the EV routing static site.
# Important for OpenShift/Rahti: the process runs as a random non-root UID,
# so temp paths must be under a writable dir. The nginx-unprivileged base
# image already handles this — this file just overrides the vhost.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Everything is static — single HTML file + summary.json
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable compression: the HTML is ~2 MB uncompressed, ~400 KB gzipped
    gzip              on;
    gzip_vary         on;
    gzip_types        text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;
    gzip_comp_level   6;

    # Cache the JSON aggressively but let the HTML revalidate, since the
    # HTML is what changes between deploys.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /summary.json {
        add_header Cache-Control "public, max-age=3600";
    }

    # Security headers (basic)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;
}
