<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GCC MileWise · Rovaniemi EV Fleet Routing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- Libraries (jsDelivr CDN, production React builds) -->
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- App (transpiled in-browser by Babel) -->
  <script type="text/babel" src="dataloader.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="mapview.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    // app.jsx exposes the component as window.GCCApp
    ReactDOM.createRoot(document.getElementById('root')).render(<GCCApp />);
  </script>
</body>
</html>
